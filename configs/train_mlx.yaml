# MLX-lm LoRA pilot config (M4 Pro 24GB)
model: "mlx-community/Llama-3.1-Nemotron-Nano-8B-v1-4bit"
data: "data/formatted"
adapter_file: "outputs/mlx_pilot/adapters.npz"

# Training
batch_size: 1
iters: 600
val_batches: 25
steps_per_report: 10
steps_per_eval: 100
save_every: 200
learning_rate: 1e-5
grad_checkpoint: true

# LoRA
lora_layers: 16
lora_rank: 16
lora_alpha: 32

# Data
max_seq_length: 2048
mask_prompt: true
seed: 42
