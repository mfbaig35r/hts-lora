# Base-model baseline: unwrapped Nemotron-Nano-8B, no LoRA.
# Empty adapter_path triggers base-only mode in load_for_inference().

adapter_path: ""
test_data: "data/formatted/test.jsonl"

generation:
  max_new_tokens: 256
  do_sample: false
  repetition_penalty: 1.05

metrics:
  - "exact_match"
  - "chapter_match"
  - "heading_match"
  - "subheading_match"
  - "abstain_rate"
  - "parse_rate"
  - "hierarchy_consistency"

output_dir: "outputs/eval_base_v1"
