# Evaluation configuration

adapter_path: "outputs/latest/adapter"
test_data: "data/formatted/test.jsonl"

generation:
  max_new_tokens: 512
  temperature: 0.1
  top_p: 0.9
  do_sample: false
  repetition_penalty: 1.05

metrics:
  - "exact_match"
  - "chapter_match"
  - "heading_match"
  - "subheading_match"
  - "top_k_accuracy"
  - "abstain_rate"
  - "json_parse_rate"
  - "confidence_calibration"

top_k_values: [1, 3, 5]

output_dir: "outputs/latest/eval"
