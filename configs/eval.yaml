# Evaluation configuration (v2 structured text output)

adapter_path: "outputs/train_h100_20260406/adapter"
test_data: "data/formatted/test.jsonl"

generation:
  max_new_tokens: 256
  do_sample: false
  repetition_penalty: 1.05

metrics:
  - "exact_match"
  - "chapter_match"
  - "heading_match"
  - "subheading_match"
  - "abstain_rate"
  - "parse_rate"
  - "hierarchy_consistency"

output_dir: "outputs/eval_v1"
